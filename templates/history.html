<!DOCTYPE html>
<html>
<head>
<title>History</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

<h1>Search History</h1>

<table>

<tr>
<th>ID</th>
<th>Query</th>
<th>Language</th>
</tr>

{% for row in rows %}

<tr>
<td>{{ row[0] }}</td>
<td>{{ row[1] }}</td>
<td>{{ row[2] }}</td>
</tr>

{% endfor %}

</table>

<br>

<a href="/">Home</a>

</div>

</body>
</html>
